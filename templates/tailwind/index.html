<!DOCTYPE html>

    <title>{{ project_name }}</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>

      <p class="mt-2 text-lg text-gray-600">{{ description }}</p>

        <div class="p-6 bg-gradient-to-br from-blue-500 to-purple-600 rounded-xl shadow-sm">
          <h3 class="font-semibold text-lg text-white">Card Two</h3>
